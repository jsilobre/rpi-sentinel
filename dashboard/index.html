<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPi Sentinel</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:24px}
    header{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    header h1{font-size:1.4rem;color:#94a3b8}
    .dot{width:10px;height:10px;border-radius:50%;background:#475569;transition:background .4s}
    .dot.connected{background:#22c55e;animation:pulse 2s infinite}
    .dot.error{background:#f87171}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .conn-label{font-size:.75rem;color:#475569}

    .sensors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:16px}

    .card{background:#1e293b;border-radius:12px;padding:20px}
    .card h2{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .metric-tag{background:#0f172a;color:#475569;border-radius:4px;padding:2px 6px;font-size:.65rem;font-weight:600;text-transform:lowercase;letter-spacing:0}

    .sensor-value{font-size:3.5rem;font-weight:700;line-height:1;letter-spacing:-2px}
    .status{display:inline-block;padding:3px 12px;border-radius:9999px;font-size:.7rem;font-weight:700;margin-top:8px;text-transform:uppercase}
    .ok   {background:#064e3b;color:#34d399}
    .alert{background:#7f1d1d;color:#f87171}

    .alerts-card{margin-top:0}
    .event-list{list-style:none}
    .event-list li{padding:9px 0;border-bottom:1px solid #0f172a;font-size:.825rem;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .event-list li:last-child{border-bottom:none}
    .badge{padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700;white-space:nowrap}
    .exceeded {background:#7f1d1d;color:#f87171}
    .recovered{background:#064e3b;color:#34d399}
    .event-sensor{color:#94a3b8;font-weight:600;font-size:.75rem}
    .ts{color:#475569;font-size:.75rem;margin-left:auto;white-space:nowrap}
    .empty{color:#475569;font-size:.875rem}
    .updated{font-size:.7rem;color:#334155;margin-top:12px;text-align:right}

    .placeholder{color:#475569;font-size:.875rem;padding:48px;text-align:center}
  </style>
</head>
<body>
  <header>
    <div class="dot" id="conn-dot"></div>
    <h1>RPi Sentinel — Cloud Dashboard</h1>
    <span class="conn-label" id="conn-label">Connecting…</span>
  </header>

  <div class="sensors-grid" id="sensors-grid">
    <div class="card" id="placeholder-card">
      <p class="placeholder">Waiting for sensor data…</p>
    </div>
  </div>

  <div class="card alerts-card">
    <h2>Recent Alerts</h2>
    <ul class="event-list" id="events">
      <li><span class="empty">No alerts</span></li>
    </ul>
  </div>

  <div class="updated" id="updated"></div>

<script>
// ── Configuration ──────────────────────────────────────────────────────────────
// Replace with your HiveMQ Cloud cluster and subscriber (read-only) credentials.
const BROKER_WSS   = '__MQTT_BROKER_WSS__';
const MQTT_USER    = '__MQTT_USER__';
const MQTT_PASS    = '__MQTT_PASS__';
const TOPIC_PREFIX = 'rpi';
// ──────────────────────────────────────────────────────────────────────────────

const MAX_HISTORY = 120;
const MAX_EVENTS  = 30;

const charts  = {};
const history = {};
const events  = [];

const palette = [
  { border: '#38bdf8', bg: 'rgba(56,189,248,0.08)'  },
  { border: '#a78bfa', bg: 'rgba(167,139,250,0.08)' },
  { border: '#34d399', bg: 'rgba(52,211,153,0.08)'  },
  { border: '#fb923c', bg: 'rgba(251,146,60,0.08)'  },
  { border: '#f472b6', bg: 'rgba(244,114,182,0.08)' },
];

function domId(sensorId) {
  return sensorId.replace(/[^a-zA-Z0-9_-]/g, '_');
}

function fmt(iso) {
  return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function setConnStatus(state) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = 'dot ' + state;
  label.textContent = {
    connected:    'Connected',
    disconnected: 'Disconnected',
    error:        'Connection error',
    Connecting:   'Connecting…',
  }[state] ?? state;
}

function ensureCard(sensorId, metric) {
  const sid = domId(sensorId);
  if (document.getElementById('card-' + sid)) return;

  // Remove placeholder once a real card arrives
  const ph = document.getElementById('placeholder-card');
  if (ph) ph.remove();

  const col = palette[Object.keys(charts).length % palette.length];
  const card = document.createElement('div');
  card.id        = 'card-' + sid;
  card.className = 'card';
  card.innerHTML = `
    <h2>${sensorId}<span class="metric-tag">${metric}</span></h2>
    <div><span class="sensor-value" id="val-${sid}">--</span></div>
    <span class="status ok" id="status-${sid}">--</span>
    <canvas id="chart-${sid}" height="140" style="margin-top:14px"></canvas>
  `;
  document.getElementById('sensors-grid').appendChild(card);

  charts[sensorId] = new Chart(
    document.getElementById('chart-' + sid).getContext('2d'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: col.border,
        backgroundColor: col.bg,
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointRadius: 0,
      }]
    },
    options: {
      responsive: true,
      animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2) } }
      },
      scales: {
        x: { ticks: { color:'#475569', maxTicksLimit:6, maxRotation:0 }, grid: { color:'#1e293b' } },
        y: { ticks: { color:'#475569', callback: v => v.toFixed(1) },   grid: { color:'#334155' } }
      }
    }
  });
}

function handleReading(sensorId, data) {
  ensureCard(sensorId, data.metric ?? '');

  if (!history[sensorId]) history[sensorId] = [];
  history[sensorId].push({ value: data.value, timestamp: data.timestamp });
  if (history[sensorId].length > MAX_HISTORY) history[sensorId].shift();

  const sid = domId(sensorId);
  document.getElementById('val-' + sid).textContent = data.value.toFixed(1);

  const s = document.getElementById('status-' + sid);
  if (s.textContent === '--') {
    s.textContent = 'OK';
    s.className   = 'status ok';
  }

  const chart = charts[sensorId];
  chart.data.labels           = history[sensorId].map(h => fmt(h.timestamp));
  chart.data.datasets[0].data = history[sensorId].map(h => h.value);
  chart.update('none');

  document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

function handleAlert(sensorId, data) {
  const sid        = domId(sensorId);
  const isExceeded = data.type === 'EXCEEDED';

  const s = document.getElementById('status-' + sid);
  if (s) {
    s.textContent = isExceeded ? 'Alert' : 'OK';
    s.className   = 'status ' + (isExceeded ? 'alert' : 'ok');
  }

  events.unshift({ ...data, sensor_id: sensorId });
  if (events.length > MAX_EVENTS) events.pop();
  renderEvents();
}

function renderEvents() {
  const ul = document.getElementById('events');
  if (!events.length) {
    ul.innerHTML = '<li><span class="empty">No alerts</span></li>';
    return;
  }
  ul.innerHTML = events.map(e => `
    <li>
      <span class="badge ${e.type === 'EXCEEDED' ? 'exceeded' : 'recovered'}">
        ${e.type === 'EXCEEDED' ? '▲ Exceeded' : '▼ Recovered'}
      </span>
      <span class="event-sensor">${e.sensor_id}</span>
      ${e.metric}=${e.value.toFixed(1)} &nbsp;/&nbsp; threshold&nbsp;${e.threshold.toFixed(1)}
      <span class="ts">${fmt(e.timestamp)}</span>
    </li>`).join('');
}

// ── MQTT connection ────────────────────────────────────────────────────────────

const client = mqtt.connect(BROKER_WSS, {
  username:        MQTT_USER,
  password:        MQTT_PASS,
  reconnectPeriod: 3000,
  keepalive:       60,
  clean:           true,
  connectTimeout:  10000,
});

client.on('connect', () => {
  setConnStatus('connected');
  client.subscribe([
    `${TOPIC_PREFIX}/+/reading`,
    `${TOPIC_PREFIX}/+/alert`,
  ], err => {
    if (err) console.error('Subscribe error:', err);
  });
});

client.on('disconnect', () => setConnStatus('disconnected'));
client.on('offline',    () => setConnStatus('disconnected'));
client.on('error',      () => setConnStatus('error'));
client.on('reconnect',  () => setConnStatus('Connecting'));

client.on('message', (topic, message) => {
  const parts = topic.split('/');
  // Topics: {prefix}/{sensor_id}/reading  or  {prefix}/{sensor_id}/alert
  if (parts.length < 3) return;

  const kind     = parts[parts.length - 1];          // "reading" or "alert"
  const sensorId = parts[parts.length - 2];

  let data;
  try { data = JSON.parse(message.toString()); }
  catch { console.warn('Malformed MQTT payload on', topic); return; }

  if (kind === 'reading') handleReading(sensorId, data);
  else if (kind === 'alert') handleAlert(sensorId, data);
});
</script>
</body>
</html>
