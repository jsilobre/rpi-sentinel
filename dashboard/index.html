<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPi Sentinel</title>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">S</span>RPi Sentinel</div>
    <div class="conn"><span class="dot" id="conn-dot"></span><span id="conn-label">Connecting…</span></div>
    <div class="spacer"></div>
    <span class="updated" id="updated"></span>
    <button class="icon-btn" id="refresh-btn" title="Force immediate sensor poll" disabled>↻ Refresh</button>
    <button class="icon-btn" id="viewmode-btn" title="Switch between per-sensor cards and a single combined graph">▦ Combined</button>
    <button class="icon-btn" id="organize-btn" title="Arrange sensor windows alphabetically">⊞ Organize</button>
    <button class="icon-btn" id="config-btn" title="Configure thresholds">⚙ Config</button>
    <button class="icon-btn" id="export-btn" title="Cloud storage required to export" disabled>⬇ Export CSV</button>
    <button class="icon-btn danger" id="clear-btn" title="Delete all stored history">🗑 Clear Data</button>
    <button class="icon-btn" id="theme-btn" title="Toggle theme">☾</button>
  </header>

  <div class="time-bar" id="time-bar">
    <span>Window:</span>
    <button class="time-btn" data-w="live" type="button">Live</button>
    <button class="time-btn" data-w="1h"   type="button">1h</button>
    <button class="time-btn" data-w="6h"   type="button">6h</button>
    <button class="time-btn" data-w="24h"  type="button">24h</button>
    <button class="time-btn" data-w="7d"   type="button">7d</button>
    <button class="time-btn" data-w="30d"  data-cloud="1" type="button" style="display:none">1mo</button>
    <button class="time-btn" data-w="180d" data-cloud="1" type="button" style="display:none">6mo</button>
    <button class="time-btn" data-w="365d" data-cloud="1" type="button" style="display:none">1y</button>
    <span id="custom-range-wrap" style="display:none;align-items:center;gap:6px;margin-left:8px">
      <span style="font-size:11px;color:var(--muted)">From</span>
      <input type="datetime-local" id="custom-from" class="config-input" style="padding:2px 6px;font-size:11px;width:155px">
      <span style="font-size:11px;color:var(--muted)">To</span>
      <input type="datetime-local" id="custom-to"   class="config-input" style="padding:2px 6px;font-size:11px;width:155px">
      <button class="time-btn" id="custom-apply-btn" type="button">Apply</button>
    </span>
  </div>

  <main>
    <section>
      <div class="section-title">Sensors <span class="count-pill" id="sensor-count">0</span></div>
      <div class="sensors-grid" id="sensors-grid">
        <div class="card" id="placeholder-card"><p class="placeholder">Waiting for sensor data…</p></div>
      </div>
      <div id="combined-wrap" style="display:none">
        <div class="card combined-card">
          <div class="combined-head">
            <span class="sensor-name">All sensors</span>
            <span class="metric-tag" id="combined-empty" style="display:none">No sensor data yet</span>
            <button class="reset-zoom-btn" id="reset-zoom-combined" type="button">&#8635; Reset</button>
          </div>
          <div class="chart-wrap"><canvas id="combined-chart"></canvas></div>
          <div class="chart-hint">Click a legend entry to toggle a sensor &middot; Scroll to zoom &middot; Drag to pan</div>
        </div>
      </div>
    </section>

    <aside class="rail">
      <div class="card">
        <div class="rail-head">
          <h2>Alert timeline</h2>
          <span class="count-pill" id="alert-count" style="margin-left:auto">0</span>
        </div>
        <ul class="event-list" id="events">
          <li><span class="empty">No alerts yet</span></li>
        </ul>
      </div>
    </aside>
  </main>

  <div class="modal-backdrop" id="config-modal">
    <div class="modal">
      <div class="modal-head">
        <h3>Threshold configuration</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div id="config-rows"><span class="empty">Waiting for RPi…</span></div>
      </div>
    </div>
  </div>

  <!-- ── Deploy-time configuration ──────────────────────────────────────────────
       These placeholders are substituted by the Deploy Dashboard workflow
       (sed over this file). They MUST stay inline here for the injection to work.
       Replace with your HiveMQ Cloud cluster and subscriber (read-only) creds. -->
  <script>
    const BROKER_WSS       = '__MQTT_BROKER_WSS__';
    const MQTT_USER        = '__MQTT_USER__';
    const MQTT_PASS        = '__MQTT_PASS__';
    const TOPIC_PREFIX     = 'rpi';
    const CLOUD_WORKER_URL = '__CLOUD_WORKER_URL__';
    // Historical windows use the Cloudflare Worker when the URL is injected.
    const CLOUD_ENABLED = CLOUD_WORKER_URL.length > 0 && !CLOUD_WORKER_URL.startsWith('__');
  </script>

  <!-- ── Application scripts (classic scripts, shared global scope) ───────────────
       Load order matters: state & helpers first, feature modules next, and
       main.js last (it creates the MQTT client and wires every event handler). -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/history.js"></script>
  <script src="js/combined.js"></script>
  <script src="js/config-panel.js"></script>
  <script src="js/handlers.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
