<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPi Sentinel</title>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f1f5f9;--surface:#ffffff;--surface-2:#f8fafc;--border:#e2e8f0;
      --text:#0f172a;--muted:#64748b;--muted-2:#94a3b8;
      --accent:#0284c7;--accent-soft:#e0f2fe;
      --ok-bg:#ecfdf5;--ok-fg:#047857;--ok-line:#10b981;
      --warn-bg:#fffbeb;--warn-fg:#b45309;--warn-line:#f59e0b;
      --err-bg:#fef2f2;--err-fg:#b91c1c;--err-line:#ef4444;
      --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
      --grid:#eef2f6;--grid-axis:#cbd5e1;
    }
    [data-theme="dark"]{
      --bg:#0b1220;--surface:#111a2e;--surface-2:#0f172a;--border:#1e293b;
      --text:#e2e8f0;--muted:#94a3b8;--muted-2:#64748b;
      --accent:#38bdf8;--accent-soft:#0c2740;
      --ok-bg:#052e23;--ok-fg:#34d399;--ok-line:#10b981;
      --warn-bg:#3a2708;--warn-fg:#fbbf24;--warn-line:#f59e0b;
      --err-bg:#3a1013;--err-fg:#fca5a5;--err-line:#ef4444;
      --shadow:none;
      --grid:#16243c;--grid-axis:#334155;
    }
    html,body{height:100%}
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.4}

    header.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;
      padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
    .brand{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--text);font-size:14px}
    .brand .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),#6366f1);
      display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
    .conn{display:flex;align-items:center;gap:8px;padding:3px 10px;border-radius:9999px;
      background:var(--surface-2);border:1px solid var(--border);font-size:11.5px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;transition:background .3s}
    .dot.connected{background:var(--ok-line);animation:pulse 2s infinite}
    .dot.rpi_offline{background:var(--warn-line)}
    .dot.error{background:var(--err-line)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .spacer{flex:1}
    .icon-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
      padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .icon-btn:hover{color:var(--text);border-color:var(--muted-2)}
    .updated{font-size:11px;color:var(--muted-2);margin-right:4px}

    main{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px;padding:16px 20px;align-items:start}
    @media (max-width: 900px){ main{grid-template-columns:1fr} }

    .section-title{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
      font-weight:600;display:flex;align-items:center;gap:8px;margin:0 4px 8px}
    .count-pill{background:var(--surface);border:1px solid var(--border);color:var(--muted);
      border-radius:9999px;padding:1px 7px;font-size:10px;letter-spacing:0;text-transform:none}

    .sensors-grid{position:relative;min-height:300px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}

    .sensor-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:move;user-select:none;touch-action:none}
    .sensor-head button{cursor:pointer}
    #placeholder-card{position:static!important;width:auto!important;height:auto!important;resize:none!important}
    #placeholder-card .placeholder{cursor:default}
    .sensor-name{font-size:12.5px;font-weight:600;color:var(--text)}
    .metric-tag{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);
      border-radius:4px;padding:1px 6px;font-size:10px;font-weight:500;font-family:ui-monospace,monospace}
    .status{margin-left:auto;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .ok{background:var(--ok-bg);color:var(--ok-fg)}
    .alert{background:var(--err-bg);color:var(--err-fg)}

    .sensor-row{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
    .sensor-value{font-size:1.9rem;font-weight:700;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
    .trend{font-size:12px;color:var(--muted);font-weight:500}
    .trend.up{color:var(--err-fg)}
    .trend.down{color:var(--ok-fg)}

    .stats{display:flex;gap:14px;margin:4px 0 8px;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
    .stats b{color:var(--text);font-weight:600}

    .sensors-grid .card{position:absolute;display:flex;flex-direction:column;resize:both;overflow:hidden;min-height:200px;min-width:280px}
    .chart-wrap{flex:1;min-height:60px}
    canvas{display:block;width:100%!important;height:100%!important}

    /* Right rail — alerts */
    .rail .card{padding:0;overflow:hidden}
    .rail-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .rail-head h2{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
    .event-list{list-style:none;max-height:calc(100vh - 160px);overflow-y:auto}
    .event-list li{padding:9px 14px;border-bottom:1px solid var(--border);display:grid;
      grid-template-columns:auto 1fr auto;gap:6px 10px;align-items:center;font-size:12px}
    .event-list li:last-child{border-bottom:none}
    .event-list li .det{grid-column:2 / 4;font-size:11px;color:var(--muted);font-family:ui-monospace,monospace}
    .badge{padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
    .exceeded{background:var(--err-bg);color:var(--err-fg)}
    .recovered{background:var(--ok-bg);color:var(--ok-fg)}
    .event-sensor{color:var(--text);font-weight:600;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ts{color:var(--muted-2);font-size:10.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
    .empty{color:var(--muted-2);font-size:12px;padding:24px 14px;display:block;text-align:center}
    .placeholder{color:var(--muted-2);font-size:12px;padding:36px 14px;text-align:center}

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
    .modal-backdrop.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;
      box-shadow:0 12px 40px rgba(15,23,42,.18);max-height:90vh;display:flex;flex-direction:column}
    .modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .modal-head h3{font-size:14px;font-weight:600}
    .modal-body{padding:6px 18px 14px;overflow-y:auto}
    .modal-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
    .modal-close:hover{color:var(--text)}

    .config-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center;
      padding:10px 0;border-bottom:1px solid var(--border)}
    .config-row:last-child{border-bottom:none}
    .config-label{font-weight:600;font-size:12.5px}
    .config-field{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
    .config-input{width:68px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
      color:var(--text);font-size:12px;padding:4px 7px;text-align:right;font-variant-numeric:tabular-nums}
    .config-input:focus{outline:none;border-color:var(--accent)}
    .config-save-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;
      padding:5px 12px;font-size:11.5px;font-weight:600;cursor:pointer}
    .config-save-btn:hover{filter:brightness(1.08)}
    .save-feedback{font-size:10.5px;min-width:42px;text-align:right}
    .save-ok{color:var(--ok-fg)}.save-err{color:var(--err-fg)}

    /* Time-window selector */
    .time-bar{display:flex;gap:6px;align-items:center;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
    .time-bar span{font-size:11px;color:var(--muted);margin-right:2px}
    .time-btn{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);
      border-radius:6px;padding:3px 11px;font-size:11.5px;font-weight:600;cursor:pointer}
    .time-btn:hover{color:var(--text);border-color:var(--muted-2)}
    .time-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    /* Reset zoom button inside sensor cards */
    .reset-zoom-btn{display:none;background:var(--surface-2);color:var(--muted);
      border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;margin-left:auto}
    .reset-zoom-btn:hover{color:var(--text)}
    /* Chart hint */
    .chart-hint{font-size:10px;color:var(--muted-2);margin-top:3px;text-align:right;user-select:none}
    /* Scrollbar */
    .event-list::-webkit-scrollbar,.modal-body::-webkit-scrollbar{width:8px}
    .event-list::-webkit-scrollbar-thumb,.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">S</span>RPi Sentinel</div>
    <div class="conn"><span class="dot" id="conn-dot"></span><span id="conn-label">Connecting…</span></div>
    <div class="spacer"></div>
    <span class="updated" id="updated"></span>
    <button class="icon-btn" id="refresh-btn" title="Force immediate sensor poll" disabled>↻ Refresh</button>
    <button class="icon-btn" id="config-btn" title="Configure thresholds">⚙ Config</button>
    <button class="icon-btn" id="theme-btn" title="Toggle theme">☾</button>
  </header>

  <div class="time-bar" id="time-bar">
    <span>Window:</span>
    <button class="time-btn" data-w="live" type="button">Live</button>
    <button class="time-btn" data-w="1h"   type="button">1h</button>
    <button class="time-btn" data-w="6h"   type="button">6h</button>
    <button class="time-btn" data-w="24h"  type="button">24h</button>
    <button class="time-btn" data-w="7d"   type="button">7d</button>
  </div>

  <main>
    <section>
      <div class="section-title">Sensors <span class="count-pill" id="sensor-count">0</span></div>
      <div class="sensors-grid" id="sensors-grid">
        <div class="card" id="placeholder-card"><p class="placeholder">Waiting for sensor data…</p></div>
      </div>
    </section>

    <aside class="rail">
      <div class="card">
        <div class="rail-head">
          <h2>Alert timeline</h2>
          <span class="count-pill" id="alert-count" style="margin-left:auto">0</span>
        </div>
        <ul class="event-list" id="events">
          <li><span class="empty">No alerts yet</span></li>
        </ul>
      </div>
    </aside>
  </main>

  <div class="modal-backdrop" id="config-modal">
    <div class="modal">
      <div class="modal-head">
        <h3>Threshold configuration</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div id="config-rows"><span class="empty">Waiting for RPi…</span></div>
      </div>
    </div>
  </div>

<script>
// ── Configuration ──────────────────────────────────────────────────────────────
// Replace with your HiveMQ Cloud cluster and subscriber (read-only) credentials.
const BROKER_WSS   = '__MQTT_BROKER_WSS__';
const MQTT_USER    = '__MQTT_USER__';
const MQTT_PASS    = '__MQTT_PASS__';
const TOPIC_PREFIX = 'rpi';
// ──────────────────────────────────────────────────────────────────────────────

const MAX_HISTORY = 120;
const MAX_EVENTS  = 50;

const charts               = {};
const history              = {};
const events               = [];
const sensorThresholds     = {};
const knownSensorIds       = new Set();
let   lastRpiStatus        = null;
let   firstConnect         = true;
const pendingHydrations    = {};  // request_id → sensorId (initial load)
const pendingHydrationSet  = new Set(); // sensorIds with an in-flight initial hydration
const pendingWindowHydrations = {}; // request_id → sensorId (window switch)
const hydratedSensors      = new Set();
const pendingSaves         = {};  // sensorId → { warn, crit, fb, sid, timer }
const WINDOW_KEY           = 'rpi-sentinel-window';
let   currentWindow        = localStorage.getItem(WINDOW_KEY) || 'live';

const palette = [
  { border: '#0ea5e9', bg: 'rgba(14,165,233,0.10)' },
  { border: '#8b5cf6', bg: 'rgba(139,92,246,0.10)' },
  { border: '#10b981', bg: 'rgba(16,185,129,0.10)' },
  { border: '#f97316', bg: 'rgba(249,115,22,0.10)' },
  { border: '#ec4899', bg: 'rgba(236,72,153,0.10)' },
];

function domId(sensorId) { return sensorId.replace(/[^a-zA-Z0-9_-]/g, '_'); }

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function fmt(isoOrMs) {
  const d = new Date(isoOrMs);
  if (currentWindow === '24h' || currentWindow === '7d')
    return d.toLocaleDateString('en', {month:'short', day:'numeric'}) + ' ' +
           d.toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function updateAnnotations(sensorId) {
  const chart = charts[sensorId];
  if (!chart) return;
  const t = sensorThresholds[sensorId];
  if (!t) { chart.options.plugins.annotation.annotations = {}; chart.update('none'); return; }
  chart.options.plugins.annotation.annotations = {
    warnLine: {
      type:'line', yMin:t.warn, yMax:t.warn,
      borderColor:'rgba(245,158,11,0.55)', borderWidth:1, borderDash:[4,4],
      label:{display:true,content:'Warn',position:'end',
             backgroundColor:'rgba(245,158,11,0.12)',color:cssVar('--warn-fg'),font:{size:10}}
    },
    critLine: {
      type:'line', yMin:t.crit, yMax:t.crit,
      borderColor:'rgba(239,68,68,0.55)', borderWidth:1, borderDash:[4,4],
      label:{display:true,content:'Crit',position:'end',
             backgroundColor:'rgba(239,68,68,0.12)',color:cssVar('--err-fg'),font:{size:10}}
    }
  };
  chart.update('none');
}

function resetZoom(sensorId) {
  if (charts[sensorId]) charts[sensorId].resetZoom();
  const btn = document.getElementById('reset-zoom-' + domId(sensorId));
  if (btn) btn.style.display = 'none';
}

function setConnStatus(state) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = 'dot ' + state;
  label.textContent = {
    connected:    'RPi online',
    rpi_offline:  'RPi offline',
    disconnected: 'Disconnected',
    error:        'Connection error',
    connecting:   'Connecting…',
  }[state] ?? state;
  updateRefreshButtonState();
}

function updateRefreshButtonState() {
  const btn = document.getElementById('refresh-btn');
  if (!btn) return;
  // `client` is declared later as a `const` and we may be called before init.
  let online = false;
  try { online = !!(client && client.connected); } catch { online = false; }
  if (btn.dataset.busy === '1') return;
  btn.disabled = !online;
  btn.title = online ? 'Force immediate sensor poll' : 'Disconnected — refresh unavailable';
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ── Free-form layout (drag to move, resize from corner) ───────────────────────
const LAYOUT_KEY      = 'rpi-sentinel-layout';
const DEFAULT_CARD_W  = 380;
const DEFAULT_CARD_H  = 300;
const LAYOUT_GAP      = 12;

function loadLayout() {
  try { return JSON.parse(localStorage.getItem(LAYOUT_KEY)) || {}; }
  catch { return {}; }
}

function saveLayout() {
  const layout = loadLayout();
  document.querySelectorAll('.card[data-sensor-id]').forEach(c => {
    layout[c.dataset.sensorId] = {
      left:   c.offsetLeft,
      top:    c.offsetTop,
      width:  c.offsetWidth,
      height: c.offsetHeight,
    };
  });
  try { localStorage.setItem(LAYOUT_KEY, JSON.stringify(layout)); } catch {}
}

function placeCard(card, sensorId, existingCount) {
  const saved = loadLayout()[sensorId];
  if (saved) {
    const grid = card.parentElement;
    const containerWidth = (grid && grid.clientWidth) || window.innerWidth || 1200;
    const width  = Math.max(280, Math.min(saved.width  ?? DEFAULT_CARD_W, containerWidth));
    const height = Math.max(200, saved.height ?? DEFAULT_CARD_H);
    const left   = Math.max(0, Math.min(saved.left ?? 0, Math.max(0, containerWidth - width)));
    const top    = Math.max(0, saved.top ?? 0);
    card.style.left   = left   + 'px';
    card.style.top    = top    + 'px';
    card.style.width  = width  + 'px';
    card.style.height = height + 'px';
    return;
  }
  const grid = card.parentElement;
  const containerWidth = grid.clientWidth || 1200;
  const cols = Math.max(1, Math.floor((containerWidth + LAYOUT_GAP) / (DEFAULT_CARD_W + LAYOUT_GAP)));
  const col  = existingCount % cols;
  const row  = Math.floor(existingCount / cols);
  card.style.left   = (col * (DEFAULT_CARD_W + LAYOUT_GAP)) + 'px';
  card.style.top    = (row * (DEFAULT_CARD_H + LAYOUT_GAP)) + 'px';
  card.style.width  = DEFAULT_CARD_W + 'px';
  card.style.height = DEFAULT_CARD_H + 'px';
}

function updateGridHeight() {
  const grid = document.getElementById('sensors-grid');
  let maxBottom = 200;
  grid.querySelectorAll('.card[data-sensor-id]').forEach(c => {
    const bottom = c.offsetTop + c.offsetHeight;
    if (bottom > maxBottom) maxBottom = bottom;
  });
  grid.style.minHeight = (maxBottom + LAYOUT_GAP) + 'px';
}

function makeDraggable(card) {
  const head = card.querySelector('.sensor-head');
  if (!head) return;
  head.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (e.target.closest('button, input, select, a, label')) return;
    const grid     = card.parentElement;
    const gridRect = grid.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    const offsetX  = e.clientX - cardRect.left;
    const offsetY  = e.clientY - cardRect.top;
    const prevUserSelect = document.body.style.userSelect;
    const pointerId = e.pointerId;
    document.body.style.userSelect = 'none';
    try { head.setPointerCapture(pointerId); } catch {}

    function onMove(ev) {
      if (ev.pointerId !== pointerId) return;
      const x = ev.clientX - gridRect.left - offsetX;
      const y = ev.clientY - gridRect.top  - offsetY;
      card.style.left = Math.max(0, x) + 'px';
      card.style.top  = Math.max(0, y) + 'px';
      updateGridHeight();
    }
    function onUp(ev) {
      if (ev.pointerId !== pointerId) return;
      head.removeEventListener('pointermove', onMove);
      head.removeEventListener('pointerup', onUp);
      head.removeEventListener('pointercancel', onUp);
      try { head.releasePointerCapture(pointerId); } catch {}
      document.body.style.userSelect = prevUserSelect;
      saveLayout();
    }
    head.addEventListener('pointermove', onMove);
    head.addEventListener('pointerup', onUp);
    head.addEventListener('pointercancel', onUp);
    e.preventDefault();
  });
}

let _layoutSaveTimer = null;
const cardResizeObserver = new ResizeObserver(() => {
  clearTimeout(_layoutSaveTimer);
  _layoutSaveTimer = setTimeout(() => { saveLayout(); updateGridHeight(); }, 150);
});

function ensureCard(sensorId, metric) {
  if (knownSensorIds.size > 0 && !knownSensorIds.has(sensorId)) return;
  const sid = domId(sensorId);
  if (document.getElementById('card-' + sid)) return;

  const ph = document.getElementById('placeholder-card');
  if (ph) ph.remove();

  const col = palette[Object.keys(charts).length % palette.length];
  const card = document.createElement('div');
  card.id        = 'card-' + sid;
  card.className = 'card';
  card.dataset.sensorId = sensorId;
  card.innerHTML = `
    <div class="sensor-head">
      <span class="sensor-name"></span>
      <span class="metric-tag"></span>
      <span class="status ok" id="status-${sid}">--</span>
      <button class="reset-zoom-btn" id="reset-zoom-${sid}" type="button">&#8635; Reset</button>
    </div>
    <div class="sensor-row">
      <span class="sensor-value" id="val-${sid}">--</span>
      <span class="trend" id="trend-${sid}"></span>
    </div>
    <div class="stats" id="stats-${sid}">
      <span>min <b>--</b></span><span>avg <b>--</b></span><span>max <b>--</b></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-${sid}"></canvas></div>
    <div class="chart-hint">Scroll to zoom &middot; Drag chart to pan &middot; Drag header to move &middot; Drag corner to resize</div>
  `;
  card.querySelector('.sensor-name').textContent = sensorId;
  card.querySelector('.metric-tag').textContent  = metric;
  card.querySelector('.reset-zoom-btn').addEventListener('click', () => resetZoom(sensorId));
  const grid = document.getElementById('sensors-grid');
  const existingBefore = grid.querySelectorAll('.card[data-sensor-id]').length;
  grid.appendChild(card);
  placeCard(card, sensorId, existingBefore);
  makeDraggable(card);
  cardResizeObserver.observe(card);
  updateGridHeight();
  document.getElementById('sensor-count').textContent = Object.keys(charts).length + 1;

  charts[sensorId] = new Chart(
    document.getElementById('chart-' + sid).getContext('2d'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: col.border,
        backgroundColor: col.bg,
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointRadius: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(2) } },
        zoom: {
          zoom: {
            wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x',
            onZoomComplete: () => {
              const btn = document.getElementById('reset-zoom-' + domId(sensorId));
              if (btn) btn.style.display = 'inline-block';
            }
          },
          pan: { enabled: true, mode: 'x' }
        },
        annotation: { annotations: {} }
      },
      scales: {
        x: { ticks: { color:cssVar('--muted-2'), maxTicksLimit:5, maxRotation:0, font:{size:10} }, grid: { color:cssVar('--grid') } },
        y: { ticks: { color:cssVar('--muted-2'), callback: v => v.toFixed(1), font:{size:10} }, grid: { color:cssVar('--grid') } }
      }
    }
  });

  updateAnnotations(sensorId);
  requestHydration(sensorId);
  // If a persisted historical window is active, also fetch the windowed view.
  if (currentWindow !== 'live') requestSingleWindowHydration(sensorId, currentWindow);
}

function requestSingleWindowHydration(sensorId, w) {
  if (!client || !client.connected) return;
  const windowMs = {'1h':3_600_000,'6h':21_600_000,'24h':86_400_000,'7d':604_800_000}[w];
  if (!windowMs) return;
  const sinceTs = Date.now() - windowMs;
  const reqId = (crypto.randomUUID && crypto.randomUUID())
    || (Date.now().toString(36) + Math.random().toString(36).slice(2));
  pendingWindowHydrations[reqId] = sensorId;
  client.publish(
    `${TOPIC_PREFIX}/history/req`,
    JSON.stringify({ request_id: reqId, sensor_id: sensorId, limit: 500, since_ts: sinceTs }),
    { qos: 1, retain: false }
  );
  setTimeout(() => { delete pendingWindowHydrations[reqId]; }, 10_000);
}

// ── History hydration ──────────────────────────────────────────────────────────
// Note: the MQTT subscriber user needs publish on rpi/history/req
// and subscribe on rpi/history/resp/+ in the broker ACL.
function requestHydration(sensorId) {
  if (hydratedSensors.has(sensorId)) return;
  if (pendingHydrationSet.has(sensorId)) return;
  if (!client || !client.connected) return;

  const reqId = (crypto.randomUUID && crypto.randomUUID())
    || (Date.now().toString(36) + Math.random().toString(36).slice(2));
  pendingHydrations[reqId] = sensorId;
  pendingHydrationSet.add(sensorId);

  client.publish(
    `${TOPIC_PREFIX}/history/req`,
    JSON.stringify({ request_id: reqId, sensor_id: sensorId, limit: MAX_HISTORY }),
    { qos: 1, retain: false }
  );

  setTimeout(() => {
    if (pendingHydrations[reqId]) {
      delete pendingHydrations[reqId];
      pendingHydrationSet.delete(sensorId);
    }
  }, 5000);
}

function applyHydration(sensorId, points) {
  if (hydratedSensors.has(sensorId)) return;
  hydratedSensors.add(sensorId);

  if (!charts[sensorId]) return;
  if (!history[sensorId]) history[sensorId] = [];

  const live = history[sensorId];
  const liveOldestMs = live.length ? new Date(live[0].timestamp).getTime() : Infinity;

  const historical = points
    .filter(p => p.ts < liveOldestMs)
    .map(p => ({ value: p.value, timestamp: new Date(p.ts).toISOString() }));

  const merged = historical.concat(live);
  history[sensorId] = merged.length > MAX_HISTORY
    ? merged.slice(merged.length - MAX_HISTORY)
    : merged;

  const chart = charts[sensorId];
  chart.data.labels           = history[sensorId].map(h => fmt(h.timestamp));
  chart.data.datasets[0].data = history[sensorId].map(h => h.value);
  chart.update('none');
  updateStats(sensorId);
}

function updateStats(sensorId) {
  const sid = domId(sensorId);
  const h   = history[sensorId] || [];
  if (!h.length) return;
  let min = Infinity, max = -Infinity, sum = 0;
  for (const p of h) { if (p.value < min) min = p.value; if (p.value > max) max = p.value; sum += p.value; }
  const avg = sum / h.length;
  document.getElementById('stats-' + sid).innerHTML =
    `<span>min <b>${min.toFixed(1)}</b></span><span>avg <b>${avg.toFixed(1)}</b></span><span>max <b>${max.toFixed(1)}</b></span>`;

  const trendEl = document.getElementById('trend-' + sid);
  if (h.length >= 5) {
    const last = h[h.length - 1].value;
    const prev = h[h.length - 5].value;
    const diff = last - prev;
    const pct  = Math.abs(prev) > 1e-9 ? (diff / Math.abs(prev)) * 100 : 0;
    if (Math.abs(pct) < 0.5) {
      trendEl.className = 'trend'; trendEl.textContent = '→ stable';
    } else if (diff > 0) {
      trendEl.className = 'trend up'; trendEl.textContent = `↑ ${diff >= 0 ? '+' : ''}${diff.toFixed(1)}`;
    } else {
      trendEl.className = 'trend down'; trendEl.textContent = `↓ ${diff.toFixed(1)}`;
    }
  }
}

function handleReading(sensorId, data) {
  if (knownSensorIds.size > 0 && !knownSensorIds.has(sensorId)) return;
  ensureCard(sensorId, data.metric ?? '');

  if (!history[sensorId]) history[sensorId] = [];
  history[sensorId].push({ value: data.value, timestamp: data.timestamp });
  if (history[sensorId].length > MAX_HISTORY) history[sensorId].shift();

  const sid = domId(sensorId);
  document.getElementById('val-' + sid).textContent = data.value.toFixed(1);

  const s = document.getElementById('status-' + sid);
  if (s.textContent === '--') { s.textContent = 'OK'; s.className = 'status ok'; }

  const chart = charts[sensorId];
  if (currentWindow === 'live') {
    chart.data.labels           = history[sensorId].map(h => fmt(h.timestamp));
    chart.data.datasets[0].data = history[sensorId].map(h => h.value);
    chart.update('none');
  } else {
    // In a historical window, append the live point so the chart keeps progressing.
    chart.data.labels.push(fmt(data.timestamp));
    chart.data.datasets[0].data.push(data.value);
    chart.update('none');
  }

  updateStats(sensorId);
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function handleAlert(sensorId, data) {
  const sid        = domId(sensorId);
  const isExceeded = data.type === 'EXCEEDED';

  const s = document.getElementById('status-' + sid);
  if (s) {
    s.textContent = isExceeded ? 'Alert' : 'OK';
    s.className   = 'status ' + (isExceeded ? 'alert' : 'ok');
  }

  events.unshift({ ...data, sensor_id: sensorId });
  if (events.length > MAX_EVENTS) events.pop();
  renderEvents();
}

function renderEvents() {
  const ul = document.getElementById('events');
  document.getElementById('alert-count').textContent = events.length;
  if (!events.length) {
    ul.innerHTML = '<li><span class="empty">No alerts yet</span></li>';
    return;
  }
  ul.innerHTML = events.map(e => {
    const exceeded = e.type === 'EXCEEDED';
    const value     = Number(e.value);
    const threshold = Number(e.threshold);
    const valStr    = Number.isFinite(value)     ? value.toFixed(1)     : '--';
    const thrStr    = Number.isFinite(threshold) ? threshold.toFixed(1) : '--';
    return `
      <li>
        <span class="badge ${exceeded ? 'exceeded' : 'recovered'}">
          ${exceeded ? '▲' : '▼'}
        </span>
        <span class="event-sensor">${escapeHtml(e.sensor_id)}</span>
        <span class="ts">${escapeHtml(fmt(e.timestamp))}</span>
        <span class="det">${escapeHtml(e.metric ?? '')}=${valStr} · threshold ${thrStr}</span>
      </li>`;
  }).join('');
}

// ── Refresh (force-poll) ───────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', () => {
  const btn = document.getElementById('refresh-btn');
  if (!client || !client.connected) return;
  btn.dataset.busy = '1';
  btn.disabled = true;
  btn.textContent = '↻ Refreshing…';
  client.publish(`${TOPIC_PREFIX}/cmd/refresh`, '{}', { qos: 1, retain: false });
  setTimeout(() => {
    btn.dataset.busy = '';
    btn.textContent = '↻ Refresh';
    updateRefreshButtonState();
  }, 2000);
});

// ── Time-window buttons (event delegation) ─────────────────────────────────────
document.getElementById('time-bar').addEventListener('click', e => {
  const btn = e.target.closest('.time-btn');
  if (!btn) return;
  setWindow(btn.dataset.w);
});

// ── Theme toggle ───────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '☀' : '☾';
  for (const id in charts) {
    const c = charts[id];
    c.options.scales.x.ticks.color = cssVar('--muted-2');
    c.options.scales.x.grid.color  = cssVar('--grid');
    c.options.scales.y.ticks.color = cssVar('--muted-2');
    c.options.scales.y.grid.color  = cssVar('--grid');
    c.update('none');
    // Annotation label colours read CSS vars at draw time, so refresh them.
    updateAnnotations(id);
  }
}
document.getElementById('theme-btn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('rpi-sentinel-theme', next); } catch {}
  applyTheme(next);
});
applyTheme(localStorage.getItem('rpi-sentinel-theme') || 'light');

// Restore persisted time window selection.
document.querySelectorAll('.time-btn').forEach(b =>
  b.classList.toggle('active', b.dataset.w === currentWindow));

// ── Config modal ───────────────────────────────────────────────────────────────
const modal           = document.getElementById('config-modal');
const modalDialog     = modal.querySelector('.modal');
modal.setAttribute('role', 'dialog');
modal.setAttribute('aria-modal', 'true');
modal.setAttribute('aria-hidden', 'true');
modalDialog.setAttribute('aria-labelledby', 'config-modal-title');
modal.querySelector('.modal-head h3').id = 'config-modal-title';

let lastFocusedBeforeModal = null;
function openModal() {
  lastFocusedBeforeModal = document.activeElement;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  // Focus the close button by default.
  setTimeout(() => document.getElementById('modal-close').focus(), 0);
}
function closeModal() {
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  if (lastFocusedBeforeModal && lastFocusedBeforeModal.focus) {
    lastFocusedBeforeModal.focus();
  }
}
document.getElementById('config-btn').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'Escape') { closeModal(); return; }
  if (e.key !== 'Tab') return;
  // Simple focus trap inside the dialog.
  const focusables = modalDialog.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]), select, textarea, [tabindex]:not([tabindex="-1"])'
  );
  if (!focusables.length) return;
  const first = focusables[0];
  const last  = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
});

// ── MQTT connection ────────────────────────────────────────────────────────────
const client = mqtt.connect(BROKER_WSS, {
  username:        MQTT_USER,
  password:        MQTT_PASS,
  reconnectPeriod: 3000,
  keepalive:       60,
  clean:           true,
  connectTimeout:  10000,
});

client.on('connect', () => {
  client.subscribe([
    `${TOPIC_PREFIX}/+/reading`,
    `${TOPIC_PREFIX}/+/alert`,
    `${TOPIC_PREFIX}/status`,
    `${TOPIC_PREFIX}/config/current`,
    `${TOPIC_PREFIX}/history/resp/+`,
  ], err => { if (err) console.error('Subscribe error:', err); });

  // Re-request hydration for any sensors that already have a card but
  // haven't been hydrated yet (e.g. after a reconnect).
  for (const sensorId of Object.keys(charts)) {
    requestHydration(sensorId);
    if (currentWindow !== 'live') requestSingleWindowHydration(sensorId, currentWindow);
  }

  updateRefreshButtonState();

  // On first connect only: fall back to rpi_offline if status never arrives.
  if (firstConnect) {
    firstConnect = false;
    setTimeout(() => {
      const label = document.getElementById('conn-label').textContent;
      if (label === 'Connecting…') setConnStatus('rpi_offline');
    }, 5000);
  }
});

client.on('disconnect', () => setConnStatus('disconnected'));
client.on('offline',    () => setConnStatus('disconnected'));
client.on('error',      () => setConnStatus('error'));
// On reconnect, restore last known RPi state immediately — no offline flash.
client.on('reconnect',  () => {
  if      (lastRpiStatus === 'online')  setConnStatus('connected');
  else if (lastRpiStatus === 'offline') setConnStatus('rpi_offline');
  else                                  setConnStatus('connecting');
});

client.on('message', (topic, message) => {
  let data;
  try { data = JSON.parse(message.toString()); }
  catch { console.warn('Malformed MQTT payload on', topic); return; }

  if (topic === `${TOPIC_PREFIX}/status`) {
    lastRpiStatus = data.status === 'online' ? 'online' : 'offline';
    setConnStatus(lastRpiStatus === 'online' ? 'connected' : 'rpi_offline');
    return;
  }

  if (topic.startsWith(`${TOPIC_PREFIX}/history/resp/`)) {
    const reqId = topic.slice((`${TOPIC_PREFIX}/history/resp/`).length);
    if (pendingWindowHydrations[reqId]) {
      const sensorId = pendingWindowHydrations[reqId];
      delete pendingWindowHydrations[reqId];
      if (Array.isArray(data.points)) applyWindowHydration(sensorId, data.points);
      return;
    }
    const sensorId = pendingHydrations[reqId];
    if (!sensorId) return;
    delete pendingHydrations[reqId];
    pendingHydrationSet.delete(sensorId);
    if (Array.isArray(data.points)) applyHydration(sensorId, data.points);
    return;
  }

  if (topic === `${TOPIC_PREFIX}/config/current`) {
    const incoming = data.sensors ?? [];

    knownSensorIds.clear();
    incoming.forEach(s => {
      knownSensorIds.add(s.id);
      sensorThresholds[s.id] = { warn: s.threshold_warn, crit: s.threshold_crit };
    });

    for (const sensorId in charts) {
      if (!knownSensorIds.has(sensorId)) {
        charts[sensorId].destroy();
        delete charts[sensorId];
        delete history[sensorId];
        hydratedSensors.delete(sensorId);
        pendingHydrationSet.delete(sensorId);
        const cardEl = document.getElementById('card-' + domId(sensorId));
        if (cardEl) {
          cardResizeObserver.unobserve(cardEl);
          cardEl.remove();
        }
      } else {
        updateAnnotations(sensorId);
      }
    }
    updateGridHeight();

    const grid = document.getElementById('sensors-grid');
    if (!grid.querySelector('.card')) {
      const ph = document.createElement('div');
      ph.id        = 'placeholder-card';
      ph.className = 'card';
      ph.innerHTML = '<p class="placeholder">Waiting for sensor data…</p>';
      grid.appendChild(ph);
    }

    document.getElementById('sensor-count').textContent =
      grid.querySelectorAll('.card:not(#placeholder-card)').length;

    renderConfigPanel();
    reconcilePendingSaves();
    return;
  }

  const parts = topic.split('/');
  if (parts.length < 3) return;
  const kind     = parts[parts.length - 1];
  const sensorId = parts[parts.length - 2];

  if (kind === 'reading') handleReading(sensorId, data);
  else if (kind === 'alert') handleAlert(sensorId, data);
});

function applyWindowHydration(sensorId, points) {
  if (!charts[sensorId]) return;
  const chart = charts[sensorId];
  chart.data.labels           = points.map(p => fmt(p.ts));
  chart.data.datasets[0].data = points.map(p => p.value);
  chart.resetZoom();
  chart.update('none');
  const btn = document.getElementById('reset-zoom-' + domId(sensorId));
  if (btn) btn.style.display = 'none';
}

function setWindow(w) {
  currentWindow = w;
  try { localStorage.setItem(WINDOW_KEY, w); } catch {}
  document.querySelectorAll('.time-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.w === w));

  for (const id of Object.keys(charts)) {
    charts[id].resetZoom();
    const btn = document.getElementById('reset-zoom-' + domId(id));
    if (btn) btn.style.display = 'none';
  }

  if (w === 'live') {
    for (const sensorId of Object.keys(charts)) {
      const h     = history[sensorId] || [];
      const chart = charts[sensorId];
      chart.data.labels           = h.map(p => fmt(p.timestamp));
      chart.data.datasets[0].data = h.map(p => p.value);
      chart.update('none');
    }
    return;
  }

  if (!client || !client.connected) return;
  const windowMs = {'1h':3_600_000,'6h':21_600_000,'24h':86_400_000,'7d':604_800_000}[w];
  const sinceTs  = Date.now() - windowMs;

  for (const sensorId of Object.keys(charts)) {
    const reqId = (crypto.randomUUID && crypto.randomUUID())
      || (Date.now().toString(36) + Math.random().toString(36).slice(2));
    pendingWindowHydrations[reqId] = sensorId;
    client.publish(
      `${TOPIC_PREFIX}/history/req`,
      JSON.stringify({ request_id: reqId, sensor_id: sensorId, limit: 500, since_ts: sinceTs }),
      { qos: 1, retain: false }
    );
    setTimeout(() => { delete pendingWindowHydrations[reqId]; }, 10_000);
  }
}

function renderConfigPanel() {
  const container = document.getElementById('config-rows');
  const ids = Object.keys(sensorThresholds);
  if (!ids.length) {
    container.innerHTML = '<span class="empty">Waiting for RPi…</span>';
    return;
  }

  // Track currently-focused input so we don't clobber an in-progress edit.
  const active   = document.activeElement;
  const activeId = active && active.id ? active.id : null;

  // Build a stable index of existing rows keyed by sensor id.
  const existing = new Map();
  container.querySelectorAll('.config-row[data-sensor-id]').forEach(r => {
    existing.set(r.dataset.sensorId, r);
  });

  // Drop rows whose sensors disappeared.
  for (const [id, row] of existing) {
    if (!(id in sensorThresholds)) row.remove();
  }
  // Clear any non-row content (e.g. the "Waiting for RPi…" placeholder).
  Array.from(container.children).forEach(c => {
    if (!c.classList || !c.classList.contains('config-row')) c.remove();
  });

  for (const id of ids) {
    const thr = sensorThresholds[id];
    const sid = domId(id);
    let row = existing.get(id);
    if (!row) {
      row = document.createElement('div');
      row.className = 'config-row';
      row.dataset.sensorId = id;
      row.innerHTML = `
        <span class="config-label"></span>
        <span class="config-field">Warn <input class="config-input" type="number" step="0.5" id="cfg-warn-${sid}"></span>
        <span class="config-field">Crit <input class="config-input" type="number" step="0.5" id="cfg-crit-${sid}"></span>
        <button class="config-save-btn" type="button">Save</button>
        <span class="save-feedback" id="cfg-fb-${sid}"></span>`;
      row.querySelector('.config-label').textContent = id;
      row.querySelector('.config-save-btn').addEventListener('click', () => saveThreshold(id, sid));
      container.appendChild(row);
    }
    const warnInput = row.querySelector('#cfg-warn-' + sid);
    const critInput = row.querySelector('#cfg-crit-' + sid);
    if (warnInput && warnInput.id !== activeId) warnInput.value = thr.warn.toFixed(1);
    if (critInput && critInput.id !== activeId) critInput.value = thr.crit.toFixed(1);
  }
}

function saveThreshold(sensorId, sid) {
  const warnEl = document.getElementById('cfg-warn-' + sid);
  const critEl = document.getElementById('cfg-crit-' + sid);
  const fb     = document.getElementById('cfg-fb-' + sid);
  const warn   = parseFloat(warnEl.value);
  const crit   = parseFloat(critEl.value);
  if (!Number.isFinite(warn) || !Number.isFinite(crit) || warn >= crit) {
    fb.textContent = 'Invalid'; fb.className = 'save-feedback save-err';
    fb.title = 'Warn must be a number strictly less than Crit';
    return;
  }
  fb.title = '';
  if (!client || !client.connected) {
    fb.textContent = 'Offline'; fb.className = 'save-feedback save-err';
    return;
  }

  // Cancel any previous pending save for this sensor.
  const prev = pendingSaves[sensorId];
  if (prev && prev.timer) clearTimeout(prev.timer);

  fb.textContent = 'Sending…'; fb.className = 'save-feedback';

  // Note: the MQTT subscriber user must have write permission on rpi/config/set in HiveMQ ACLs
  client.publish(
    `${TOPIC_PREFIX}/config/set`,
    JSON.stringify({ sensor_id: sensorId, threshold_warn: warn, threshold_crit: crit }),
    { qos: 1, retain: false },
    err => {
      if (err) {
        fb.textContent = 'Error'; fb.className = 'save-feedback save-err';
        delete pendingSaves[sensorId];
        return;
      }
      fb.textContent = 'Sent'; fb.className = 'save-feedback';
      pendingSaves[sensorId] = {
        warn, crit, sid, fb,
        timer: setTimeout(() => {
          if (pendingSaves[sensorId]) {
            fb.textContent = 'No ack'; fb.className = 'save-feedback save-err';
            delete pendingSaves[sensorId];
          }
        }, 5000),
      };
    }
  );
}

function reconcilePendingSaves() {
  for (const [sensorId, p] of Object.entries(pendingSaves)) {
    const thr = sensorThresholds[sensorId];
    if (!thr) continue;
    const warnMatch = Math.abs(thr.warn - p.warn) < 1e-6;
    const critMatch = Math.abs(thr.crit - p.crit) < 1e-6;
    if (warnMatch && critMatch) {
      p.fb.textContent = 'Saved'; p.fb.className = 'save-feedback save-ok';
    } else {
      p.fb.textContent = 'Mismatch'; p.fb.className = 'save-feedback save-err';
      p.fb.title = `Server applied warn=${thr.warn}, crit=${thr.crit}`;
    }
    if (p.timer) clearTimeout(p.timer);
    setTimeout(() => { p.fb.textContent = ''; p.fb.title = ''; }, 3000);
    delete pendingSaves[sensorId];
  }
}
</script>
