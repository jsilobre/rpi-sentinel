name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject MQTT credentials
        env:
          MQTT_BROKER_WSS:  ${{ secrets.MQTT_BROKER_WSS }}
          MQTT_USER:        ${{ secrets.MQTT_USER }}
          MQTT_PASS:        ${{ secrets.MQTT_PASS }}
          CLOUD_WORKER_URL: ${{ secrets.CLOUD_WORKER_URL }}
        run: |
          sed -i \
            -e "s|__MQTT_BROKER_WSS__|${MQTT_BROKER_WSS}|g" \
            -e "s|__MQTT_USER__|${MQTT_USER}|g" \
            -e "s|__MQTT_PASS__|${MQTT_PASS}|g" \
            -e "s|__CLOUD_WORKER_URL__|${CLOUD_WORKER_URL}|g" \
            dashboard/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
